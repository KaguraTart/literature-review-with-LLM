name: CI

on:
  push:
    branches:
      - main
      - chat_bug_fix
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-package:
    name: Check and package XPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run project checks
        run: npm run check

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: literature-review-with-llm-release-artifacts
          path: |
            build/literature-review-with-llm.xpi
            build/update.json
          if-no-files-found: error
          retention-days: 30
