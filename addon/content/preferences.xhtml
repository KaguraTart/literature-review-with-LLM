<vbox xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
      xmlns:html="http://www.w3.org/1999/xhtml"
      id="zotero-prefpane-markdown-summary"
      onload="ZoteroMarkdownSummaryPrefs.init()">
  <script src="chrome://zotero-markdown-summary/content/messages.js"/>
  <script src="chrome://zotero-markdown-summary/content/provider-models.js"/>
  <script src="chrome://zotero-markdown-summary/content/auto-update.js"/>
  <groupbox>
    <label><html:h2 id="zms-title">Literature Review with LLM</html:h2></label>
    <vbox class="zms-form">
      <hbox align="center" class="zms-row">
        <label class="zms-label" id="zms-uiLanguage-label" value="界面语言"/>
        <menulist id="zms-uiLanguage">
          <menupopup>
            <menuitem label="自动" value="auto"/>
            <menuitem label="中文" value="zh-CN"/>
            <menuitem label="English" value="en-US"/>
          </menupopup>
        </menulist>
      </hbox>
      <hbox align="center" class="zms-row">
        <label class="zms-label" id="zms-outputLanguage-label" value="输出语言"/>
        <menulist id="zms-outputLanguage">
          <menupopup>
            <menuitem label="中文" value="zh-CN"/>
            <menuitem label="English" value="en-US"/>
            <menuitem label="日本語" value="ja-JP"/>
          </menupopup>
        </menulist>
      </hbox>
      <hbox align="center" class="zms-row">
        <label class="zms-label" id="zms-promptPackId-label" value="提示模板包"/>
        <menulist id="zms-promptPackId">
          <menupopup>
            <menuitem label="通用阅读" value="general"/>
            <menuitem label="AI / ML / 系统" value="ai-ml"/>
            <menuitem label="交通与城市空域" value="transportation"/>
            <menuitem label="医学与生命科学" value="biomedicine"/>
            <menuitem label="社科与政策" value="social-science"/>
            <menuitem label="综述写作 / Review writing" value="review-writing"/>
          </menupopup>
        </menulist>
      </hbox>
      <hbox align="center" class="zms-row">
        <label class="zms-label" id="zms-activeProfileId-label" value="默认接口档案"/>
        <html:input class="zms-field" id="zms-activeProfileId" list="zms-profile-options"/>
        <html:datalist id="zms-profile-options"/>
      </hbox>
      <hbox align="center" class="zms-row">
        <label class="zms-label" id="zms-provider-label" value="接口厂商"/>
        <menulist id="zms-provider">
          <menupopup>
            <menuitem label="MiniMax OpenAI 兼容" value="minimax"/>
            <menuitem label="OpenAI 原生" value="openai"/>
            <menuitem label="OpenAI 兼容接口" value="openai_compatible"/>
            <menuitem label="OpenAI Responses 兼容接口" value="openai_responses_compatible"/>
            <menuitem label="Anthropic 原生" value="anthropic"/>
            <menuitem label="Anthropic 兼容接口" value="anthropic_compatible"/>
            <menuitem label="Gemini OpenAI 兼容" value="gemini"/>
            <menuitem label="Azure OpenAI" value="azure_openai"/>
            <menuitem label="Vercel AI Gateway OpenAI 兼容" value="vercel_ai_chat"/>
            <menuitem label="Vercel AI Gateway Responses 兼容" value="vercel_ai_responses"/>
            <menuitem label="Vercel AI Gateway Anthropic 兼容" value="vercel_ai_anthropic"/>
            <menuitem label="Cline API OpenAI 兼容" value="cline_api"/>
            <menuitem label="LiteLLM Proxy OpenAI 兼容" value="litellm_proxy_chat"/>
            <menuitem label="LiteLLM Proxy Responses 兼容" value="litellm_proxy_responses"/>
            <menuitem label="LiteLLM Proxy Anthropic 兼容" value="litellm_proxy_anthropic"/>
            <menuitem label="Cloudflare AI OpenAI 兼容" value="cloudflare_ai_chat"/>
            <menuitem label="Cloudflare AI Responses 兼容" value="cloudflare_ai_responses"/>
            <menuitem label="Cloudflare AI Anthropic 兼容" value="cloudflare_ai_anthropic"/>
            <menuitem label="GitHub Models OpenAI 兼容" value="github_models"/>
            <menuitem label="Hugging Face OpenAI 兼容" value="huggingface"/>
            <menuitem label="DeepInfra OpenAI 兼容" value="deepinfra"/>
            <menuitem label="Fireworks AI OpenAI 兼容" value="fireworks"/>
            <menuitem label="Cerebras OpenAI 兼容" value="cerebras"/>
            <menuitem label="NVIDIA NIM OpenAI 兼容" value="nvidia_nim"/>
            <menuitem label="SambaNova OpenAI 兼容" value="sambanova"/>
            <menuitem label="SambaNova Responses 兼容" value="sambanova_responses"/>
            <menuitem label="SambaNova Anthropic 兼容" value="sambanova_anthropic"/>
            <menuitem label="xAI OpenAI 兼容" value="xai"/>
            <menuitem label="Groq OpenAI 兼容" value="groq"/>
            <menuitem label="Mistral OpenAI 兼容" value="mistral"/>
            <menuitem label="Together AI OpenAI 兼容" value="together"/>
            <menuitem label="Kimi / Moonshot OpenAI 兼容" value="kimi"/>
            <menuitem label="Perplexity Sonar" value="perplexity"/>
            <menuitem label="DeepSeek OpenAI 兼容" value="deepseek"/>
            <menuitem label="DeepSeek Anthropic 兼容" value="deepseek_anthropic"/>
            <menuitem label="Z.AI Anthropic 兼容" value="zai_anthropic"/>
            <menuitem label="OpenRouter" value="openrouter"/>
            <menuitem label="Qwen / DashScope" value="dashscope"/>
            <menuitem label="SiliconFlow" value="siliconflow"/>
            <menuitem label="Zhipu / GLM OpenAI 兼容" value="zhipu"/>
            <menuitem label="Volcengine Ark / Doubao" value="volcengine"/>
            <menuitem label="Baidu Qianfan" value="qianfan"/>
            <menuitem label="Tencent Hunyuan" value="hunyuan"/>
            <menuitem label="Ollama OpenAI 兼容" value="ollama"/>
            <menuitem label="LM Studio OpenAI 兼容" value="lm_studio"/>
            <menuitem label="本地代理工具" value="local_agents"/>
          </menupopup>
        </menulist>
      </hbox>
      <hbox align="center" class="zms-row">
        <label class="zms-label" id="zms-baseURL-label" value="接口地址"/>
        <html:input class="zms-field" id="zms-baseURL"/>
      </hbox>
      <hbox align="center" class="zms-row">
        <label class="zms-label" id="zms-apiKey-label" value="API 密钥"/>
        <html:input class="zms-field" id="zms-apiKey" type="password"/>
      </hbox>
      <hbox align="start" class="zms-row zms-model-row">
        <label class="zms-label" id="zms-model-label" value="模型"/>
        <html:div class="zms-model-picker">
          <html:div class="zms-model-picker-controls">
            <html:label class="zms-inline-label" id="zms-model-vendor-filter-label" for="zms-model-vendor-select">模型厂商</html:label>
            <html:select class="zms-field zms-model-vendor-select" id="zms-model-vendor-select"></html:select>
            <html:label class="zms-inline-label" id="zms-model-select-label" for="zms-model-select">具体模型</html:label>
            <html:select class="zms-field zms-model-select" id="zms-model-select"></html:select>
            <button id="zms-load-models-button" label="加载在线模型" oncommand="ZoteroMarkdownSummaryPrefs.loadModels()"/>
          </html:div>
          <html:input class="zms-field zms-model-custom" id="zms-model" hidden="hidden" placeholder="自定义或私有部署模型名称"/>
          <html:datalist id="zms-model-options"/>
        </html:div>
      </hbox>
      <html:label id="zms-model-help" class="zms-small-note" value="先选接口厂商，推荐模型会自动显示；OpenRouter、LiteLLM、Cline API 这类聚合服务可再选模型厂商。只有私有部署或列表里没有的模型才需要自定义；有 API Key 时点“加载在线模型”会追加厂商实时返回的模型。"/>
      <vbox class="zms-row">
        <label id="zms-providerEnv-label" value="粘贴环境变量配置"/>
        <html:textarea class="zms-small-json" id="zms-providerEnvText" placeholder="OPENAI_API_KEY=...&#10;OPENAI_MODEL=..."/>
        <hbox align="center" class="zms-actions">
          <button id="zms-apply-provider-env-button" label="应用到当前档案" oncommand="ZoteroMarkdownSummaryPrefs.applyProviderEnvFromText()"/>
        </hbox>
      </vbox>
      <vbox class="zms-row">
        <label id="zms-providerGuide-label" value="配置指南"/>
        <html:pre class="zms-provider-guide" id="zms-providerGuide"></html:pre>
      </vbox>
      <vbox class="zms-row">
        <label id="zms-profileStatus-label" value="档案状态"/>
        <html:pre class="zms-profile-status" id="zms-profileStatus"></html:pre>
      </vbox>
      <vbox class="zms-row zms-outputDir-row">
        <label class="zms-label" id="zms-outputDir-label" value="输出目录"/>
        <html:div class="zms-outputDir-control">
          <html:input class="zms-field zms-outputDir-field" id="zms-outputDir"/>
          <html:button class="zms-outputDir-button" id="zms-choose-outputDir-button" type="button" title="从系统文件管理器选择输出文件夹" onclick="ZoteroMarkdownSummaryPrefs.chooseOutputDir()">选择文件夹...</html:button>
          <html:button class="zms-outputDir-button" id="zms-save-outputDir-button" type="button" title="保存当前输入的输出目录" onclick="ZoteroMarkdownSummaryPrefs.saveOutputDir()">保存</html:button>
        </html:div>
      </vbox>
      <hbox align="center" class="zms-row">
        <label class="zms-label" id="zms-inputMode-label" value="输入模式"/>
        <menulist id="zms-inputMode">
          <menupopup>
            <menuitem label="提取文本" value="text"/>
            <menuitem label="PDF 原文" value="pdf_base64"/>
          </menupopup>
        </menulist>
      </hbox>
      <hbox align="center" class="zms-row">
        <label class="zms-label" id="zms-maxOutputTokens-label" value="最大输出 token"/>
        <html:input class="zms-number" id="zms-maxOutputTokens" type="number" min="512" step="512"/>
      </hbox>
      <hbox align="center" class="zms-row">
        <label class="zms-label" id="zms-temperature-label" value="温度"/>
        <html:input class="zms-number" id="zms-temperature" type="number" min="0.1" max="1" step="0.1"/>
      </hbox>
      <hbox align="center" class="zms-row">
        <label class="zms-label" id="zms-stream-label" value="流式输出"/>
        <checkbox id="zms-stream"/>
      </hbox>
      <hbox align="start" class="zms-row">
        <label class="zms-label" id="zms-autoUpdate-label" value="插件更新"/>
        <vbox class="zms-checkbox-stack">
          <checkbox id="zms-autoUpdateEnabled" label="自动同步更新" oncommand="ZoteroMarkdownSummaryPrefs.saveAutoUpdatePreference()"/>
          <html:label id="zms-autoUpdateHelp" class="zms-small-note">默认开启。关闭后插件会停止自动同步更新提示，并尝试禁用当前扩展的后台更新。</html:label>
        </vbox>
      </hbox>
      <html:details class="zms-advanced-settings">
        <html:summary id="zms-advancedSettings-summary">高级设置</html:summary>
        <html:p id="zms-advancedSettings-help" class="zms-small-note">通常不需要修改；用于自定义接口协议、请求头、提示词和技能模板。</html:p>
        <vbox class="zms-advanced-settings-body">
          <vbox class="zms-row zms-profile-editor">
            <label><html:h2 id="zms-profileEditor-label">接口档案编辑器</html:h2></label>
            <hbox align="center" class="zms-row">
              <label class="zms-label" id="zms-profileName-label" value="档案名称"/>
              <html:input class="zms-field" id="zms-profileName"/>
            </hbox>
            <hbox align="center" class="zms-row">
              <label class="zms-label" id="zms-profileProtocol-label" value="协议"/>
              <menulist id="zms-profileProtocol">
                <menupopup>
                  <menuitem label="OpenAI 聊天补全" value="openai_chat"/>
                  <menuitem label="OpenAI Responses" value="openai_responses"/>
                  <menuitem label="Anthropic 消息接口" value="anthropic_messages"/>
                </menupopup>
              </menulist>
            </hbox>
            <hbox align="center" class="zms-row">
              <label class="zms-label" id="zms-profileEndpointMode-label" value="接口模式"/>
              <menulist id="zms-profileEndpointMode">
                <menupopup>
                  <menuitem label="Base URL 自动拼接" value="base_url"/>
                  <menuitem label="完整 URL" value="full_url"/>
                </menupopup>
              </menulist>
            </hbox>
            <hbox align="center" class="zms-row">
              <label class="zms-label" id="zms-profileFullURL-label" value="完整接口地址"/>
              <html:input class="zms-field" id="zms-profileFullURL"/>
            </hbox>
            <vbox class="zms-row">
              <label id="zms-profileCapabilities-label" value="能力声明"/>
              <html:div class="zms-capability-grid">
                <html:label><html:input id="zms-cap-text" type="checkbox"/> <html:span id="zms-cap-text-label">文本</html:span></html:label>
                <html:label><html:input id="zms-cap-pdfBase64" type="checkbox"/> <html:span id="zms-cap-pdfBase64-label">PDF 原文</html:span></html:label>
                <html:label><html:input id="zms-cap-imageBase64" type="checkbox"/> <html:span id="zms-cap-imageBase64-label">图片输入</html:span></html:label>
                <html:label><html:input id="zms-cap-streaming" type="checkbox"/> <html:span id="zms-cap-streaming-label">流式输出</html:span></html:label>
                <html:label><html:input id="zms-cap-fileReference" type="checkbox"/> <html:span id="zms-cap-fileReference-label">文件引用</html:span></html:label>
                <html:label><html:input id="zms-cap-embeddings" type="checkbox"/> <html:span id="zms-cap-embeddings-label">向量嵌入</html:span></html:label>
                <html:label><html:input id="zms-cap-jsonMode" type="checkbox"/> <html:span id="zms-cap-jsonMode-label">JSON 模式</html:span></html:label>
                <html:label><html:input id="zms-cap-toolUse" type="checkbox"/> <html:span id="zms-cap-toolUse-label">工具调用</html:span></html:label>
                <html:label><html:input id="zms-cap-modelList" type="checkbox"/> <html:span id="zms-cap-modelList-label">在线模型列表</html:span></html:label>
              </html:div>
            </vbox>
            <vbox class="zms-row">
              <label id="zms-profileCustomHeaders-label" value="自定义请求头（JSON）"/>
              <html:textarea class="zms-small-json" id="zms-profileCustomHeaders"/>
            </vbox>
            <vbox class="zms-row">
              <label id="zms-profileBodyExtra-label" value="额外请求体（JSON）"/>
              <html:textarea class="zms-small-json" id="zms-profileBodyExtra"/>
            </vbox>
            <vbox class="zms-row">
              <label id="zms-profileLocalAgent-label" value="本地代理"/>
              <hbox align="center" class="zms-row">
                <label class="zms-label" id="zms-profileLocalAgentEnabled-label" value="启用本地代理"/>
                <checkbox id="zms-profileLocalAgentEnabled"/>
              </hbox>
              <hbox align="center" class="zms-row">
                <label class="zms-label" id="zms-profileLocalAgentEndpoint-label" value="代理地址"/>
                <html:input class="zms-field" id="zms-profileLocalAgentEndpoint"/>
              </hbox>
              <hbox align="center" class="zms-row">
                <label class="zms-label" id="zms-profileLocalAgentTool-label" value="默认工具名"/>
                <html:input class="zms-field" id="zms-profileLocalAgentTool"/>
              </hbox>
              <hbox align="center" class="zms-row">
                <label class="zms-label" id="zms-profileLocalAgentPayloadMode-label" value="请求格式"/>
                <menulist id="zms-profileLocalAgentPayloadMode">
                  <menupopup>
                    <menuitem label="JSON-RPC" value="jsonrpc"/>
                    <menuitem label="简化请求" value="simple"/>
                  </menupopup>
                </menulist>
              </hbox>
              <hbox align="center" class="zms-row">
                <label class="zms-label" id="zms-profileLocalAgentTimeout-label" value="超时（秒）"/>
                <html:input class="zms-number" id="zms-profileLocalAgentTimeout" type="number" min="1" step="1"/>
              </hbox>
              <hbox align="center" class="zms-row">
                <label class="zms-label" id="zms-profileLocalAgentFallback-label" value="失败后回退远端"/>
                <checkbox id="zms-profileLocalAgentFallback"/>
              </hbox>
              <vbox class="zms-row">
                <label id="zms-profileLocalAgentHeaders-label" value="代理请求头（JSON）"/>
                <html:textarea class="zms-small-json" id="zms-profileLocalAgentHeaders"/>
              </vbox>
              <vbox class="zms-row">
                <label id="zms-profileLocalAgentSkills-label" value="技能级配置（JSON，可选）"/>
                <html:textarea class="zms-small-json" id="zms-profileLocalAgentSkills"/>
                <html:label id="zms-local-agent-note-1" class="zms-small-note" value="按 skill id 配置 endpoint/tool/timeout/payloadMode，值可为空对象。ask-all/check 未配置独立映射时将默认使用 ask-gemini / ask-claude / ask-opencode；ask-gemini-claude 可只调用 Gemini 和 Claude。"/>
                <html:label id="zms-local-agent-note-2" class="zms-small-note" value="三位子技能可共用同一 endpoint，若某 skill 未单独配置 tool，会按 skill id 自动映射到对应工具名（ask_gemini/ask_claude/ask_opencode）。"/>
                <html:label id="zms-local-agent-note-3" class="zms-small-note" value="支持在技能配置中透传 args/body/params/payload。"/>
                <html:label id="zms-local-agent-note-4" class="zms-small-note" value="若接口使用非 tools/call 方法，可在技能配置里设置 method。"/>
                <html:label id="zms-local-agent-note-5" class="zms-small-note" value="本地代理需是可 HTTP 调用的 JSON-RPC 端点（payloadMode 建议 jsonrpc）；原生 stdio MCP 可执行文件请先用 HTTP 桥接层转发后再配置。"/>
              </vbox>
            </vbox>
            <hbox class="zms-actions">
              <button id="zms-load-profile-button" label="加载档案" oncommand="ZoteroMarkdownSummaryPrefs.loadProfileEditor()"/>
              <button id="zms-save-profile-button" label="保存档案" oncommand="ZoteroMarkdownSummaryPrefs.saveProfileFromEditor()"/>
              <button id="zms-delete-profile-button" label="删除档案" oncommand="ZoteroMarkdownSummaryPrefs.deleteProfileFromEditor()"/>
              <button id="zms-reset-profiles-button" label="重置默认档案" oncommand="ZoteroMarkdownSummaryPrefs.resetProfilesToDefaults()"/>
            </hbox>
          </vbox>
          <vbox class="zms-row">
            <label id="zms-systemPrompt-label" value="系统提示词"/>
            <html:textarea class="zms-prompt" id="zms-systemPrompt"/>
          </vbox>
          <vbox class="zms-row">
            <label id="zms-userPrompt-label" value="总结提示词"/>
            <html:textarea class="zms-prompt" id="zms-userPrompt"/>
          </vbox>
          <vbox class="zms-row zms-skill-editor">
            <label id="zms-skillTemplate-label" value="聊天技能提示词"/>
            <hbox align="center" class="zms-row">
              <label class="zms-label" id="zms-skillId-label" value="技能"/>
              <menulist id="zms-skillId" editable="true" oncommand="ZoteroMarkdownSummaryPrefs.loadSkillTemplateEditor()">
                <menupopup>
                  <menuitem label="单篇深度总结" value="paper-deep-summary"/>
                  <menuitem label="方法抽取" value="method-extractor"/>
                  <menuitem label="实验表格" value="experiment-table-builder"/>
                  <menuitem label="图表/截图解析" value="figure-table-extractor"/>
                  <menuitem label="文献矩阵" value="literature-matrix-builder"/>
                  <menuitem label="跨论文文献综述" value="literature-review-synthesis"/>
                  <menuitem label="证据检查" value="citation-audit"/>
                  <menuitem label="自定义总结" value="custom-summary"/>
                  <menuitem label="Gemini 咨询" value="ask-gemini"/>
                  <menuitem label="Claude 咨询" value="ask-claude"/>
                  <menuitem label="Opencode 咨询" value="ask-opencode"/>
                  <menuitem label="三位顾问联席" value="ask-all-agents"/>
                  <menuitem label="Gemini + Claude 双顾问" value="ask-gemini-claude"/>
                  <menuitem label="本地代理连通性检查" value="check-local-agents"/>
                </menupopup>
              </menulist>
            </hbox>
            <html:textarea class="zms-prompt zms-skill-template" id="zms-skillTemplate"/>
            <hbox class="zms-actions">
              <button id="zms-load-skill-button" label="加载技能模板" oncommand="ZoteroMarkdownSummaryPrefs.loadSkillTemplateEditor()"/>
              <button id="zms-save-skill-button" label="保存技能模板" oncommand="ZoteroMarkdownSummaryPrefs.saveSkillTemplateEditor()"/>
              <button id="zms-reset-skill-button" label="重置为内置模板" oncommand="ZoteroMarkdownSummaryPrefs.resetSkillTemplateEditor()"/>
            </hbox>
          </vbox>
          <vbox class="zms-row">
            <label id="zms-profilesJson-label" value="接口档案 JSON"/>
            <html:textarea class="zms-json" id="zms-profilesJson"/>
          </vbox>
        </vbox>
      </html:details>
    </vbox>
    <hbox class="zms-actions">
      <button id="zms-save-button" label="保存设置" oncommand="ZoteroMarkdownSummaryPrefs.save()"/>
      <button id="zms-doctor-button" label="配置预检" oncommand="ZoteroMarkdownSummaryPrefs.checkProviderConfig()"/>
      <button id="zms-test-button" label="保存并测试" oncommand="ZoteroMarkdownSummaryPrefs.testConnection()"/>
      <label id="zms-status"/>
    </hbox>
  </groupbox>
</vbox>
