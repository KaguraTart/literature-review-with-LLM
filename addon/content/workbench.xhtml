<?xml version="1.0"?>
<?xml-stylesheet href="workbench.css" type="text/css"?>
<window xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
        xmlns:html="http://www.w3.org/1999/xhtml"
        id="zms-workbench"
        title="Literature Review with LLM"
        width="1040"
        height="760">
  <script src="messages.js"/>
  <script src="provider-models.js"/>
  <script src="markdown-render.js"/>
  <script src="candidate-sources.js"/>
  <script src="workbench.js"/>
  <html:main class="zms-workbench-shell">
    <html:aside id="zms-settings-panel" class="zms-sidebar" aria-hidden="true">
      <html:div class="zms-settings-header">
        <html:h1 id="zms-workbench-title">Literature Review with LLM</html:h1>
        <html:button id="zms-settings-close" class="zms-settings-close" type="button">× Close</html:button>
      </html:div>
      <html:section class="zms-panel zms-panel-primary" data-zms-panel="profile">
        <html:h2 id="zms-quick-settings-heading">Quick Settings</html:h2>
        <html:label id="zms-workbench-output-dir-label" for="zms-workbench-output-dir">Output directory</html:label>
        <html:div class="zms-output-dir-row">
          <html:input id="zms-workbench-output-dir" type="text"/>
          <html:button id="zms-workbench-choose-output-dir" type="button">Choose Folder...</html:button>
          <html:button id="zms-workbench-save-output-dir" type="button">Save</html:button>
        </html:div>
        <html:label id="zms-profile-label" for="zms-profile">Profile</html:label>
        <html:select id="zms-profile"></html:select>
        <html:label id="zms-workbench-provider-label" for="zms-workbench-provider">Model provider</html:label>
        <html:select id="zms-workbench-provider"></html:select>
        <html:label id="zms-profile-name-label" for="zms-profile-name">Profile name</html:label>
        <html:input id="zms-profile-name" type="text"/>
        <html:label id="zms-profile-base-url-label" for="zms-profile-base-url">Base URL</html:label>
        <html:input id="zms-profile-base-url" type="url"/>
        <html:label id="zms-profile-api-key-label" for="zms-profile-api-key">API Key</html:label>
        <html:input id="zms-profile-api-key" type="password"/>
        <html:label id="zms-profile-model-label" for="zms-profile-model">Model</html:label>
        <html:div class="zms-profile-model-row">
          <html:select id="zms-profile-model-select"></html:select>
          <html:input id="zms-profile-model" type="text" list="zms-workbench-model-options"/>
          <html:datalist id="zms-workbench-model-options"/>
          <html:button id="zms-load-models-workbench" class="zms-load-models-button" type="button" title="Fetch the model list from the current provider">Load models</html:button>
        </html:div>
        <html:details class="zms-settings-details">
          <html:summary id="zms-workbench-provider-env-heading">Paste env config</html:summary>
          <html:textarea id="zms-workbench-provider-env-text" class="zms-provider-env-text" placeholder="OPENAI_API_KEY=...&#10;OPENAI_MODEL=..."></html:textarea>
          <html:div class="zms-actions">
            <html:button id="zms-workbench-apply-provider-env" type="button">Apply to current profile</html:button>
          </html:div>
        </html:details>
        <html:label class="zms-checkbox-row" id="zms-profile-image-label">
          <html:input id="zms-profile-image-input" type="checkbox"/>
          <html:span id="zms-profile-image-text">Images</html:span>
        </html:label>
        <html:label class="zms-checkbox-row" id="zms-profile-pdf-label">
          <html:input id="zms-profile-pdf-input" type="checkbox"/>
          <html:span id="zms-profile-pdf-text">Raw PDF</html:span>
        </html:label>
        <html:label class="zms-checkbox-row" id="zms-local-ocr-label">
          <html:input id="zms-local-ocr-input" type="checkbox"/>
          <html:span id="zms-local-ocr-text">Local OCR</html:span>
        </html:label>
        <html:details id="zms-local-ocr-options" class="zms-settings-details">
          <html:summary id="zms-local-ocr-options-heading">Local OCR Options</html:summary>
          <html:label id="zms-local-ocr-endpoint-label" for="zms-local-ocr-endpoint">MCP Endpoint</html:label>
          <html:input id="zms-local-ocr-endpoint" type="url"/>
          <html:label id="zms-local-ocr-tool-label" for="zms-local-ocr-tool">Tool</html:label>
          <html:input id="zms-local-ocr-tool" type="text"/>
          <html:label id="zms-local-ocr-language-label" for="zms-local-ocr-language">Language</html:label>
          <html:input id="zms-local-ocr-language" type="text"/>
          <html:p id="zms-local-ocr-help" class="zms-muted">Use eng by default. Chinese OCR needs local language data.</html:p>
        </html:details>
        <html:div class="zms-actions zms-profile-actions">
          <html:button id="zms-save-profile-settings" type="button">Save</html:button>
          <html:button id="zms-test-profile-settings" type="button">Save and Test</html:button>
          <html:button id="zms-export-provider-diagnostics" type="button">Export Diagnostics</html:button>
        </html:div>
        <html:p id="zms-profile-status" class="zms-muted"></html:p>
        <html:label id="zms-skill-label" for="zms-skill">Skill</html:label>
        <html:select id="zms-skill"></html:select>
        <html:p id="zms-skill-description" class="zms-muted"></html:p>
        <html:label id="zms-prompt-pack-label" for="zms-prompt-pack">Research domain</html:label>
        <html:select id="zms-prompt-pack"></html:select>
        <html:p id="zms-prompt-pack-description" class="zms-muted"></html:p>
      </html:section>
      <html:details class="zms-panel zms-settings-details" data-zms-panel="paper">
        <html:summary id="zms-paper-heading">Paper</html:summary>
        <html:div id="zms-paper-meta" class="zms-muted">Loading</html:div>
      </html:details>
      <html:details class="zms-panel zms-settings-details" data-zms-panel="sessions">
        <html:summary id="zms-sessions-heading">Sessions</html:summary>
        <html:div class="zms-actions zms-session-actions">
          <html:button id="zms-save-session">Save Session</html:button>
          <html:button id="zms-export-reading-log">Export Log</html:button>
          <html:button id="zms-export-comparison-report">Export Matrix</html:button>
          <html:button id="zms-start-cross-review">Cross-paper Review</html:button>
          <html:button id="zms-export-visual-report">Export Visual</html:button>
          <html:button id="zms-export-review-draft">Export Draft</html:button>
          <html:button id="zms-export-proposal-note">Export Proposal</html:button>
          <html:button id="zms-export-journal-outline">Export Outline</html:button>
          <html:button id="zms-new-conversation" title="Start a fresh conversation (the current one is auto-saved)">New conversation</html:button>
          <html:button id="zms-compact-context" title="Compress older messages into a summary to free context window">Compact context</html:button>
          <html:button id="zms-copy-session" title="Copy the current conversation as Markdown">Copy session</html:button>
          <html:button id="zms-open-reader">Read Markdown</html:button>
        </html:div>
        <html:section class="zms-visual-review-editor" aria-live="polite">
          <html:div class="zms-visual-review-header">
            <html:strong id="zms-visual-review-heading">Chart review</html:strong>
            <html:div class="zms-visual-review-actions">
              <html:button id="zms-load-visual-review">Load review</html:button>
              <html:button id="zms-save-visual-review">Save review</html:button>
            </html:div>
          </html:div>
          <html:p id="zms-visual-review-status" class="zms-muted">No visual report loaded.</html:p>
          <html:div id="zms-visual-review-list" class="zms-list zms-visual-review-list"></html:div>
        </html:section>
        <html:div id="zms-session-list" class="zms-list"></html:div>
      </html:details>
      <html:details class="zms-panel zms-settings-details" data-zms-panel="candidates">
        <html:summary id="zms-candidates-heading">Candidates</html:summary>
        <html:label id="zms-candidate-query-label" for="zms-candidate-query">Search Query</html:label>
        <html:textarea id="zms-candidate-query"></html:textarea>
        <html:div class="zms-candidate-search-grid">
          <html:label id="zms-candidate-limit-label" for="zms-candidate-limit">Limit</html:label>
          <html:input id="zms-candidate-limit" type="number" min="1" max="50" value="10"/>
          <html:label id="zms-candidate-email-label" for="zms-candidate-email">Email</html:label>
          <html:input id="zms-candidate-email" type="email"/>
        </html:div>
        <html:label id="zms-candidate-semantic-key-label" for="zms-candidate-semantic-key">Semantic Scholar API Key</html:label>
        <html:input id="zms-candidate-semantic-key" type="password"/>
        <html:div class="zms-citation-policy-grid">
          <html:label id="zms-citation-policy-label" for="zms-citation-policy">Network Policy</html:label>
          <html:select id="zms-citation-policy">
            <html:option id="zms-citation-policy-balanced" value="balanced" selected="selected">Balanced</html:option>
            <html:option id="zms-citation-policy-precise" value="precise">Precise</html:option>
            <html:option id="zms-citation-policy-broad" value="broad">Broad</html:option>
          </html:select>
          <html:label id="zms-citation-direction-label" for="zms-citation-direction">Direction</html:label>
          <html:select id="zms-citation-direction">
            <html:option id="zms-citation-direction-both" value="both" selected="selected">Both</html:option>
            <html:option id="zms-citation-direction-references" value="references">References</html:option>
            <html:option id="zms-citation-direction-citations" value="citations">Citations</html:option>
          </html:select>
          <html:label id="zms-citation-hops-label" for="zms-citation-hops">Hops</html:label>
          <html:input id="zms-citation-hops" type="number" min="1" max="3" value="2"/>
          <html:label id="zms-citation-max-requests-label" for="zms-citation-max-requests">Max Requests</html:label>
          <html:input id="zms-citation-max-requests" type="number" min="1" max="100" value="12"/>
          <html:label id="zms-citation-per-seed-label" for="zms-citation-per-seed">Per Seed</html:label>
          <html:input id="zms-citation-per-seed" type="number" min="1" max="100" value="4"/>
          <html:label id="zms-citation-seed-limit-label" for="zms-citation-seed-limit">Seeds</html:label>
          <html:input id="zms-citation-seed-limit" type="number" min="1" max="20" value="4"/>
        </html:div>
        <html:div class="zms-actions zms-candidate-actions">
          <html:button id="zms-search-candidates">Search</html:button>
          <html:button id="zms-expand-citation-network">Expand Network</html:button>
          <html:button id="zms-load-candidates">Load</html:button>
          <html:button id="zms-apply-candidate-recommendations">Apply Recommendations</html:button>
          <html:button id="zms-save-candidates">Save Decisions</html:button>
          <html:button id="zms-export-candidate-review">Export Review</html:button>
          <html:button id="zms-import-candidates">Import Included</html:button>
          <html:button id="zms-attach-candidate-pdfs">Attach PDFs</html:button>
          <html:button id="zms-reconcile-candidate-duplicates">Mark Duplicates</html:button>
        </html:div>
        <html:p id="zms-candidate-status" class="zms-muted"></html:p>
        <html:div id="zms-candidate-list" class="zms-list zms-candidate-list"></html:div>
      </html:details>
      <html:div id="zms-status" class="zms-status">Ready</html:div>
    </html:aside>
    <html:section class="zms-chat">
      <html:header class="zms-chat-bar">
        <html:div class="zms-chat-context">
          <html:div id="zms-chat-paper-title" class="zms-chat-paper-title">Paper Chat</html:div>
          <html:div id="zms-chat-status" class="zms-chat-status">Ready</html:div>
        </html:div>
        <html:div class="zms-chat-actions">
          <html:button id="zms-settings-toggle" class="zms-settings-toggle" type="button">Settings</html:button>
          <html:button id="zms-close-workbench" class="zms-close-workbench" type="button">×</html:button>
        </html:div>
      </html:header>
      <html:div id="zms-messages" class="zms-messages"></html:div>
      <html:section id="zms-writeback" class="zms-writeback" hidden="hidden">
        <html:h2 id="zms-writeback-title">Write Preview</html:h2>
        <html:div class="zms-writeback-grid">
          <html:label for="zms-write-action" id="zms-write-action-label">Action</html:label>
          <html:select id="zms-write-action">
            <html:option value="append_research_notes">Append to Research Notes</html:option>
            <html:option value="append_section">Append to Section</html:option>
            <html:option value="replace_section">Replace Section</html:option>
          </html:select>
          <html:label for="zms-write-section" id="zms-write-section-label">Section</html:label>
          <html:select id="zms-write-section"></html:select>
        </html:div>
        <html:pre id="zms-write-summary" class="zms-write-summary"></html:pre>
        <html:textarea id="zms-write-diff" readonly="readonly"></html:textarea>
        <html:div class="zms-actions">
          <html:button id="zms-preview-write">Preview</html:button>
          <html:button id="zms-confirm-write">Confirm Write</html:button>
          <html:button id="zms-cancel-write">Cancel</html:button>
        </html:div>
      </html:section>
      <html:footer id="zms-composer" class="zms-composer">
        <html:div id="zms-image-attachments" class="zms-image-attachments" hidden="hidden"></html:div>
        <html:textarea id="zms-input" placeholder="Ask about the current paper" autofocus="autofocus" tabindex="0"></html:textarea>
        <html:input id="zms-image-file" type="file" accept="image/*" multiple="multiple" hidden="hidden"/>
        <html:div class="zms-composer-toolbar">
          <html:div class="zms-composer-left">
            <html:button id="zms-attach-image" class="zms-icon-button zms-attach-image" type="button">+</html:button>
            <html:span id="zms-composer-profile" class="zms-composer-pill zms-composer-label">Model</html:span>
          </html:div>
          <html:div class="zms-composer-actions">
            <html:button id="zms-stop" class="zms-icon-button zms-stop-button" type="button">Stop</html:button>
            <html:button id="zms-send" class="zms-send-button" type="button">Send</html:button>
          </html:div>
        </html:div>
      </html:footer>
    </html:section>
  </html:main>
</window>
